name: CodeQL

"on":
  pull_request:
  push:
    branches:
      - "**"
  schedule:
    - cron: "31 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
